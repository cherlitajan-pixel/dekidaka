<style>
/* === Reset === */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* === Dot grid corners === */
.dot-grid {
  position: fixed; z-index: 0; pointer-events: none;
  width: 160px; height: 160px;
  background-image: radial-gradient(circle, rgba(90,110,145,0.18) 1.5px, transparent 1.5px);
  background-size: 14px 14px;
}
.dot-grid-tl { top: 0; left: 0; }
.dot-grid-br { bottom: 0; right: 0; }

/* === Base === */
.wrap {
  padding: 16px 20px 24px;
  background: #E4EAF2;
  min-height: 100vh;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
  z-index: 1;
}

/* === Header === */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
.header-brand {

  font-weight: 600;
  letter-spacing: 0.14em;
  color: #9AA4B2;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.header-title {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-title h1 {
  font-size: 22px;
  font-weight: 700;
  color: #1A2335;
  letter-spacing: -0.01em;
}
.badge-model {
  background: #E4EAF2;
  box-shadow: 3px 3px 6px #C2C9D6, -3px -3px 6px #FFFFFF;
  border-radius: 8px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 700;
  color: #378ADD;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.legend { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8892A4; }
.lb { width: 10px; height: 10px; border-radius: 3px; }
.date-badge {
  background: #E4EAF2;
  box-shadow: 3px 3px 7px #C2C9D6, -3px -3px 7px #FFFFFF;
  border-radius: 10px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 600;
  color: #4A5570;

}

/* === Shift Dropdown === */
.shift-wrap { position: relative; display: inline-block; }
.shift-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  background: #E4EAF2;
  box-shadow: 3px 3px 7px #C2C9D6, -3px -3px 7px #FFFFFF;
  border: none; border-radius: 10px;

}
.shift-btn:active { box-shadow: inset 2px 2px 5px #C2C9D6, inset -1px -1px 4px #FFFFFF; }
.shift-btn .caret { font-size: 9px; color: #9AA4B2; }
.shift-menu {
  display: none; position: absolute; top: calc(100% + 6px); right: 0;
  background: #E4EAF2;
  box-shadow: 6px 6px 14px #C2C9D6, -4px -4px 10px #FFFFFF;

.shift-item {

/* === KPI Metrics === */

.mc {

/* === Animations === */
@keyframes fadeUp {

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script>
Chart.register(ChartDataLabels);
const DAYS = [
  {key:'SUN', label:'Sun', color:'#E04060'},
  {key:'MON', label:'Mon', color:'#F5C100'},
  {key:'TUE', label:'Tue', color:'#E879A0'},
  {key:'WED', label:'Wed', color:'#1DB560'},
  {key:'THU', label:'Thu', color:'#F97316'},
  {key:'FRI', label:'Fri', color:'#378ADD'},
  {key:'SAT', label:'Sat', color:'#8B5CF6'},
];

// Day shift 07:30–16:30 (10 slots, 1-hr interval)
const DAY_HOURS = ['07:30','08:30','09:40','10:30','12:30','13:30','14:40','15:30','16:50','17:30'];
const DAY_PLAN  = [798, 900, 850, 920, 880, 750, 820, 950, 800, 860];

// Night shift 19:30–04:30 (10 slots, 1-hr interval; crosses midnight)
const NIGHT_HOURS = ['19:35','20:30','21:40','22:30','23:30','01:30','02:40','04:30','05:30','06:30'];
const NIGHT_PLAN  = [780, 850, 900, 820, 760, 840, 910, 870, 800, 720];

const T_HI = 100, T_LO = 90;
const CT = 4; // Cycle time in seconds

// ── PPAS slot definitions ────────────────────────────────────────────
const PPAS_DAY_SLOTS = [
  { time:'07:35 – 08:30', plan:798 },
  { time:'08:30 – 09:30', plan:900 },
  { time:'09:40 – 10:30', plan:850 },
  { time:'10:30 – 11:30', plan:920 },
  { time:'12:30 – 13:30', plan:880 },
  { time:'13:30 – 14:30', plan:750 },
  { time:'14:40 – 15:30', plan:820 },
  { time:'15:30 – 16:15', plan:950 },
  { time:'16:50 – 17:50', plan:800 },
  { time:'17:50 – 19:20', plan:860 },
];
const PPAS_NIGHT_SLOTS = [
  { time:'19:35 – 20:30', plan:780 },
  { time:'20:30 – 21:30', plan:850 },
  { time:'21:40 – 22:30', plan:900 },
  { time:'22:30 – 23:30', plan:820 },
  { time:'23:30 – 00:30', plan:760 },
  { time:'01:30 – 02:30', plan:840 },
  { time:'02:40 – 03:30', plan:910 },
  { time:'04:30 – 05:15', plan:870 },
  { time:'05:50 – 06:50', plan:800 },
  { time:'06:50 – 07:20', plan:720 },
];

// Mock PPAS actual production per slot per day
const PPAS_ACT_DAY = {
  SUN: [775,850,840,910,870,720,800,890,790,850],
  MON: [770,840,840,860,860,740,750,930,850,850],
  TUE: [710,860,800,860,870,740,750,820,760,600],
  WED: [770,760,680,740,760,680,670,730,760,760],
  THU: [770,760,700,780,760,680,780,730,780,760],
  FRI: [770,740,650,760,760,680,700,730,760,760],
  SAT: [775,700,740,780,740,660,780,730,780,760],
};
const PPAS_ACT_NIGHT = {
  SUN: [760,840,850,800,740,820,840,830,780,680],
  MON: [700,840,810,760,740,770,720,730,720,680],
  TUE: [700,750,700,760,740,750,730,770,790,700],
  WED: [760,700,780,750,770,730,710,790,700,640],
  THU: [740,700,650,780,750,770,720,700,710,650],
  FRI: [730,740,680,760,680,770,750,760,730,660],
  SAT: [720,760,710,700,670,750,750,730,740,680],
};

// Mock month %OA (March 2026) — per shift view
const OA_MONTH = { all: 74.2, day: 75.8, night: 72.6 };

function oaColor(v) {
  return v >= T_LO ? '#2EB87A' : '#E04060';
}

// ── Derive shift dataset ────────────────────────────────────────────
function getShiftData(shiftKey, dayKey) {
  if (shiftKey === 'day') {
    const oa = PPAS_ACT_DAY[dayKey].map((a, i) => Math.round(a / DAY_PLAN[i] * 100));
    return { hours: DAY_HOURS, plan: DAY_PLAN, oa };
  }
  if (shiftKey === 'night') {
    const oa = PPAS_ACT_NIGHT[dayKey].map((a, i) => Math.round(a / NIGHT_PLAN[i] * 100));
    return { hours: NIGHT_HOURS, plan: NIGHT_PLAN, oa };
  }
  const actAll  = [...PPAS_ACT_DAY[dayKey], ...PPAS_ACT_NIGHT[dayKey]];
  const planAll = [...DAY_PLAN, ...NIGHT_PLAN];
  const oa = actAll.map((a, i) => Math.round(a / planAll[i] * 100));
  return { hours: [...DAY_HOURS, ...NIGHT_HOURS], plan: planAll, oa };
}

// Row height per slot (fewer rows → taller, more rows → compact)
function chartHeight(numRows) {
  return numRows <= 10 ? numRows * 36 + 20 : numRows * 28 + 20;
}

// ── Dropdown ────────────────────────────────────────────────────────
let currentShift = 'all';
const SHIFT_LABELS = { all:'All Shift', day:'Day Shift', night:'Night Shift' };

function toggleShiftMenu() {
  document.getElementById('shift-menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.shift-wrap'))
    document.getElementById('shift-menu').classList.remove('open');
});

function selectShift(val) {
  currentShift = val;
  document.getElementById('shift-label').textContent = SHIFT_LABELS[val];
  document.querySelectorAll('.shift-item').forEach(el => {
    el.querySelector('.chk').textContent = el.dataset.value === val ? '✓' : ' ';
  });
  document.getElementById('shift-menu').classList.remove('open');
  applyFilter();
}

// ── Band plugin ─────────────────────────────────────────────────────
const bandPlugin = {
  id: 'band',
  beforeDatasetsDraw(chart) {
    const { ctx, scales } = chart;
    const xOA = scales['xOA'], yMain = scales['y'];
    if (!xOA || !yMain) return;
    const xLo = xOA.getPixelForValue(T_LO);
    const xHi = xOA.getPixelForValue(100);
    const top = yMain.top, bot = yMain.bottom;
    ctx.save();
    ctx.fillStyle = 'rgba(24,95,165,0.07)';
    ctx.fillRect(xLo, top, xHi - xLo, bot - top);
    ctx.setLineDash([4,3]); ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(24,95,165,0.55)';
    ctx.beginPath(); ctx.moveTo(xLo, top); ctx.lineTo(xLo, bot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xHi, top); ctx.lineTo(xHi, bot); ctx.stroke();
    ctx.restore();
  },
  afterDraw(chart) {
    const { ctx, scales } = chart;
    const xOA = scales['xOA'], yMain = scales['y'];
    if (!xOA || !yMain) return;
    const xLo = xOA.getPixelForValue(T_LO);
    const xHi = xOA.getPixelForValue(100);
    const labelY = yMain.top - 2;
    ctx.save();
    ctx.font = '7px sans-serif';
    ctx.fillStyle = 'rgba(24,95,165,0.8)';
    ctx.textAlign = 'right';
    ctx.fillText('90%', xLo - 2, labelY);
    ctx.textAlign = 'left';
    ctx.fillText('100%', xHi + 2, labelY);
    ctx.restore();
  }
};

// Plugin: draw a separator line between day/night when in All Shift view
const sepPlugin = {
  id: 'sep',
  afterDatasetsDraw(chart) {
    if (!chart._showSep) return;
    const { ctx, scales } = chart;
    const y = scales['y'];
    if (!y) return;
    // Separator between slot index 9 and 10
    const y1 = y.getPixelForValue(DAY_HOURS[DAY_HOURS.length - 1]);
    const y2 = y.getPixelForValue(NIGHT_HOURS[0]);
    const sepY = (y1 + y2) / 2;
    ctx.save();
    ctx.setLineDash([3, 4]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(148,163,184,0.45)';
    ctx.beginPath();
    ctx.moveTo(scales['y'].left, sepY);
    ctx.lineTo(scales['xBar'].right, sepY);
    ctx.stroke();
    // Label
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(148,163,184,0.7)';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('▼ Night', (scales['y'].left + scales['xBar'].right) / 2, sepY - 2);
    ctx.restore();
  }
};

// ── Build cards ─────────────────────────────────────────────────────
const charts = {};
const grid = document.getElementById('grid');

DAYS.forEach((d, idx_d) => {

  card.className = 'day-card';
  card.innerHTML = `
    <div class="day-header">

      <span class="day-oa-val" id="oa-${d.key}">—</span>
    </div>
    <div class="chart-wrap" id="wrap-${d.key}"><canvas id="c-${d.key}"></canvas></div>
  `;
  grid.appendChild(card);

  // Build with placeholder data; applyFilter() will populate
  charts[d.key] = new Chart(card.querySelector(`#c-${d.key}`), {
    plugins: [bandPlugin, sepPlugin],
    data: { labels: [], datasets: [
      { type:'bar',  label:'Plan',   data:[], backgroundColor:'rgba(180,178,169,0.3)', borderColor:'rgba(180,178,169,0.5)', borderWidth:0.5, borderRadius:2, xAxisID:'xBar', yAxisID:'y', order:2, barPercentage:0.8, categoryPercentage:0.9 },
      { type:'bar',  label:'Actual', data:[], backgroundColor:[], borderRadius:2, xAxisID:'xBar', yAxisID:'y', order:3, barPercentage:0.8, categoryPercentage:0.9 },
      { type:'line', label:'%OA',    data:[], borderColor:d.color, borderWidth:1.8, pointRadius:[], pointBackgroundColor:[], pointBorderColor:[], tension:0.35, xAxisID:'xOA', yAxisID:'yOA', order:1 },
    ]},
    options: {
      indexAxis:'y', responsive:true, maintainAspectRatio:false, animation:false,
      plugins: {
        legend:{ display:false },
        tooltip:{
          mode:'index',
          callbacks:{
            title: ctx2 => ctx2[0]?.label ?? '',
            label: ctx2 => {
              if (ctx2.dataset.label==='Plan')   return ` Plan: ${ctx2.raw?.toLocaleString()} pcs`;
              if (ctx2.dataset.label==='Actual') return ` Actual: ${ctx2.raw?.toLocaleString()} pcs`;
              if (ctx2.dataset.label==='%OA')    return ` %OA: ${ctx2.raw}%`;
              return '';
            }
          }
        },
        datalabels: {
          display: ctx => ctx.dataset.label === '%OA',
          formatter: v => typeof v === 'number' ? v.toFixed(1)+'%' : v+'%',
          font: { size: 7 },
          color: ctx => ctx.dataset.pointBackgroundColor?.[ctx.dataIndex] ?? '#aaa',
          anchor: 'end',

          offset: 2,
        },
      },
      scales: {
        y: {
          type:'category', labels:[], position:'left',
          ticks:{ font:{size:8}, color:'#aaa', display: idx_d === 0 },
          grid:{ color:'rgba(128,128,128,0.08)', lineWidth:0.5 },
          offset:true, afterFit(s){ s.width = 34; },
        },

      }
    }
  });
});

// ── Parse "HH:MM – HH:MM" → duration in seconds ─────────────────────
function calcSeconds(timeStr) {
  const [t1, t2] = timeStr.split('–').map(s => s.trim());
  const [h1, m1] = t1.split(':').map(Number);
  const [h2, m2] = t2.split(':').map(Number);
  let mins = (h2 * 60 + m2) - (h1 * 60 + m1);
  if (mins < 0) mins += 24 * 60;   // กรณีข้ามเที่ยงคืน
  return mins * 60;
}

// ── PPAS Table renderer ─────────────────────────────────────────────
function renderPpasTable() {
  const isAll   = currentShift === 'all';
  const isNight = currentShift === 'night';
  const slots   = isAll   ? [...PPAS_DAY_SLOTS, ...PPAS_NIGHT_SLOTS]
                : isNight ? PPAS_NIGHT_SLOTS
                :            PPAS_DAY_SLOTS;

  const actByDay = key => isAll   ? [...PPAS_ACT_DAY[key], ...PPAS_ACT_NIGHT[key]]
                        : isNight ? PPAS_ACT_NIGHT[key]
                        :            PPAS_ACT_DAY[key];

  // Dates for week 09/03–15/03/2026 (Sun–Sat)
  const DATES = ['09/03','10/03','11/03','12/03','13/03','14/03','15/03'];
  const totalCols = 2 + DAYS.length * 2;

  // ── Header (2 rows) ──────────────────────────────────────────────
  const hdr1 = DAYS.map((d, i) =>
    `<th colspan="2" class="ppas-th-date" style="color:${d.color}">วันที่ ${DATES[i]}</th>`
  ).join('');
  const hdr2 = DAYS.map(d =>
    `<th style="color:${d.color};font-size:10px;text-align:center;font-weight:600">${d.label}</th>
     <th style="min-width:26px;font-size:10px;text-align:center;color:${d.color}">%OA</th>`
  ).join('');

  let html = `<thead>
    <tr>
      <th rowspan="2" class="ppas-td-time" style="text-align:left">เวลา</th>
      <th rowspan="2" class="ppas-td-plan">PLAN<br><span style="font-weight:400;font-size:9px">100–90%</span></th>
      ${hdr1}
    </tr>
    <tr>${hdr2}</tr>
  </thead><tbody>`;

  // ── Data rows ─────────────────────────────────────────────────────
  let accumTheo = 0, accumPlan = 0;
  const accumAct = {};
  DAYS.forEach(d => { accumAct[d.key] = 0; });

  slots.forEach((slot, i) => {
    if (isAll && i === PPAS_DAY_SLOTS.length) {
      html += `<tr class="ppas-tr-sep"><td colspan="${totalCols}">▼ Night Shift</td></tr>`;
    }
    const secs = calcSeconds(slot.time);
    const theoretical = Math.round(secs / CT);
    const slotPlan90 = Math.round(theoretical * 0.9);
    accumTheo += theoretical;
    accumPlan += slotPlan90;

    const dayCells = DAYS.map(d => {
      const v = actByDay(d.key)[i];
      accumAct[d.key] += v;
      const slotOa = v / slot.plan * 100;
      const color = slotOa >= T_LO ? '#2EB87A' : '#E04060';
      return `<td class="ppas-cell-diag">
        <span class="ppas-act" style="color:${color}">${v.toLocaleString()}</span>
        <span class="ppas-pln">${accumAct[d.key].toLocaleString()}</span>
      </td>
      <td class="ppas-cell-sub" style="color:${color}">${slotOa.toFixed(1)}%</td>`;
    }).join('');
    html += `<tr>
      <td class="ppas-td-time">
        ${slot.time}
        <div class="ppas-secs">${secs.toLocaleString()} sec</div>
      </td>
      <td class="ppas-cell-diag ppas-td-plan">
        <span class="ppas-act">${theoretical.toLocaleString()} – ${slotPlan90.toLocaleString()}</span>
        <span class="ppas-pln">${accumTheo.toLocaleString()} – ${accumPlan.toLocaleString()}</span>
      </td>
      ${dayCells}
    </tr>`;
  });

  // ── TOTAL / DAY ───────────────────────────────────────────────────
  const planTotal = slots.reduce((s, r) => s + r.plan, 0);
  html += `<tr class="ppas-tr-total">
    <td class="ppas-td-time">TOTAL / DAY</td>
    <td class="ppas-cell-diag ppas-td-plan">
      <span class="ppas-act">${accumTheo.toLocaleString()} – ${accumPlan.toLocaleString()}</span>
      <span class="ppas-pln">${accumTheo.toLocaleString()} – ${accumPlan.toLocaleString()}</span>
    </td>
    ${DAYS.map(d => {
      const tot = actByDay(d.key).slice(0, slots.length).reduce((s, v) => s + v, 0);
      const totOa = tot / planTotal * 100;
      const totColor = totOa >= T_LO ? '#2EB87A' : '#E04060';
      return `<td>${tot.toLocaleString()}</td>
              <td style="color:${totColor};font-size:12px;font-weight:700;text-align:center">${totOa.toFixed(1)}%</td>`;
    }).join('')}
  </tr>`;

  document.getElementById('ppas-table').innerHTML = html;
}

function getActualData(shiftKey, dayKey) {
  if (shiftKey === 'day')   return PPAS_ACT_DAY[dayKey];
  if (shiftKey === 'night') return PPAS_ACT_NIGHT[dayKey];
  return [...PPAS_ACT_DAY[dayKey], ...PPAS_ACT_NIGHT[dayKey]];
}

// ── Apply filter ────────────────────────────────────────────────────
function applyFilter() {
  const isAll = currentShift === 'all';

  // Compute max plan for xBar axis
  const maxPlanDay   = Math.max(...DAY_PLAN);
  const maxPlanNight = Math.max(...NIGHT_PLAN);
  const rawMax = isAll ? Math.max(maxPlanDay, maxPlanNight)
    : currentShift === 'day' ? maxPlanDay : maxPlanNight;
  const maxPcs = Math.ceil(rawMax * 1.08 / 100) * 100;

  // Chart height
  const numRows  = isAll ? 20 : 10;
  const h = chartHeight(numRows);

  // Update each day card
  DAYS.forEach(d => {
    const { hours, plan, oa } = getShiftData(currentShift, d.key);
    const actual = getActualData(currentShift, d.key);
    // Daily %OA badge — weighted: sum(actual) / sum(plan)
    const dayAvgOa = actual.reduce((a,b)=>a+b,0) / plan.reduce((a,b)=>a+b,0) * 100;
    const oaEl = document.getElementById('oa-' + d.key);
    oaEl.textContent = '%OA day ' + dayAvgOa.toFixed(1) + '%';
    oaEl.style.color = oaColor(dayAvgOa);
    const inRange = oa.map(v => v >= T_LO);

    const chart = charts[d.key];
    chart._showSep = isAll;

    chart.data.labels = hours;
    chart.data.datasets[0].data = plan;
    chart.data.datasets[1].data = actual;
    chart.data.datasets[1].backgroundColor = inRange.map(ok => ok ? 'rgba(46,184,122,0.85)' : 'rgba(224,64,96,0.85)');
    chart.data.datasets[2].data = oa;
    chart.data.datasets[2].pointRadius          = oa.map(v => v >= T_LO ? 3 : 4);
    chart.data.datasets[2].pointBackgroundColor = oa.map(v => v >= T_LO ? '#2EB87A' : '#E04060');
    chart.data.datasets[2].pointBorderColor     = oa.map(v => v >= T_LO ? '#2EB87A' : '#E04060');

    chart.options.scales.y.labels   = hours;
    chart.options.scales.yOA.labels = hours;
    chart.options.scales.xBar.max   = maxPcs;
    chart.options.scales.xBar.ticks.callback = v => (v===0||v===maxPcs)?(maxPcs>=1000?(v/1000).toFixed(1)+'k':v):null;

    document.getElementById('wrap-' + d.key).style.height = h + 'px';
    chart.update();
  });

  // Axis label position
  document.getElementById('ax-top').style.top = '45px';
  document.getElementById('ax-bot').style.top = (h + 50) + 'px';

  // Metrics — aggregate 7 days
  let tPlan = 0, tActual = 0, tOa = 0, redPts = 0;
  DAYS.forEach(d => {
    const { plan, oa } = getShiftData(currentShift, d.key);
    plan.forEach((p, i) => {
      tPlan   += p;
      tActual += Math.round(p * oa[i] / 100);
      tOa     += oa[i];
      if (oa[i] < T_LO) redPts++;
    });
  });
  const weekOa  = (tActual / tPlan * 100).toFixed(1);
  const workDays = DAYS.length;
  const avgRed  = (redPts / workDays).toFixed(1);

  const monthOa = OA_MONTH[currentShift].toFixed(1);

  const planColor = '#1A2335';
  document.getElementById('m-plan').innerHTML =
    `${tPlan.toLocaleString()}<span class="mv-sub" style="color:${planColor}">pieces</span>`;
  document.getElementById('m-actual').innerHTML =
    `${tActual.toLocaleString()}<span class="mv-sub" style="color:${planColor}">pieces</span>`;
  const moColor = oaColor(+monthOa);
  const moLabel = +monthOa >= T_LO ? 'above target' : 'below target';
  document.getElementById('m-oa-month').innerHTML =
    `<span style="color:${moColor}">${monthOa}%</span><span class="mv-sub" style="color:${moColor}"><span class="mv-dot" style="background:${moColor}"></span>${moLabel}</span>`;
  const wkColor = oaColor(+weekOa);
  const wkLabel = +weekOa >= T_LO ? 'above target' : 'below target';
  document.getElementById('m-oa').innerHTML =
    `<span style="color:${wkColor}">${weekOa}%</span><span class="mv-sub" style="color:${wkColor}"><span class="mv-dot" style="background:${wkColor}"></span>${wkLabel}</span>`;
  document.getElementById('m-red-total').textContent   = redPts + ' times';
  document.getElementById('m-red-days').textContent    = workDays + ' days';
  document.getElementById('m-red').textContent         = avgRed + ' times/day';
  document.getElementById('m-red').style.color         = '#E04060';

  renderPpasTable();
}

// Initial render
applyFilter();
</script>


<style>
* { box-sizing:border-box; margin:0; padding:0; }
.wrap { padding:10px; font-family:var(--font-sans,sans-serif); }
.top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:6px; flex-wrap:wrap; gap:6px; }
.ttl { font-size:14px; font-weight:500; color:var(--color-text-primary); }
.sub { font-size:11px; color:var(--color-text-secondary); margin-top:2px; }
.legend { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
.li { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--color-text-secondary); }
.lb { width:10px; height:10px; border-radius:2px; }
.metrics { display:flex; gap:6px; margin-bottom:8px; }
.mc { flex:1; background:var(--color-background-secondary); border-radius:6px; padding:6px 8px; }
.ml { font-size:10px; color:var(--color-text-secondary); }
.mv { font-size:16px; font-weight:500; }
.grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.day-card { background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:8px; overflow:hidden; }
.day-header { padding:5px 6px 3px; border-bottom:0.5px solid var(--color-border-tertiary); background:var(--color-background-secondary); display:flex; justify-content:center; align-items:baseline; }
.day-name { font-size:13px; font-weight:600; }
.day-oa { font-size:11px; font-weight:500; }
.chart-wrap { position:relative; height:360px; padding:4px 4px 0; }
.grid-outer { position:relative; }
.axis-line { display:flex; align-items:center; gap:6px; position:absolute; left:0; right:0; z-index:20; pointer-events:none; }
.axis-lbl { font-size:9px; font-weight:500; color:#94A3B8; white-space:nowrap; }
.axis-hr { flex:1; height:1px; background:#94A3B8; opacity:0.4; }
</style>

<div class="wrap">
  <div class="top">
    <div>
      <div class="ttl">Production Dekidaka — 3rd SE Rotor Assy (A218)</div>
      <div class="sub">Week 09/03–15/03/2026 · Day shift</div>
    </div>
    <div class="legend">
      <div class="li"><div class="lb" style="background:rgba(180,178,169,0.6)"></div>Plan</div>
      <div class="li"><div class="lb" style="background:#1D9E75"></div>Actual (in range)</div>
      <div class="li"><div class="lb" style="background:#E24B4A"></div>Actual (out of range)</div>
      <div class="li"><div style="width:14px;border-top:1.5px dashed #378ADD"></div>%OA</div>
      <div class="li"><div style="width:14px;border-top:1.5px dashed #185FA5;opacity:.5"></div>Target ±5%</div>
    </div>
  </div>

  <div class="metrics">
    <div class="mc"><div class="ml">Plan (week)</div><div class="mv">9,577</div></div>
    <div class="mc"><div class="ml">Actual (week)</div><div class="mv">6,682</div></div>
    <div class="mc"><div class="ml">%OA week</div><div class="mv" style="color:#BA7517">69.8%</div></div>
    <div class="mc"><div class="ml">Avg Red Pts/shift</div><div class="mv" style="color:#D85A30">42.7</div></div>
  </div>

  <div class="grid-outer">
    <div class="axis-line" style="top:45px"><span class="axis-lbl">%OA</span><div class="axis-hr"></div></div>
    <div class="grid" id="grid"></div>
    <div class="axis-line" style="top:354px"><span class="axis-lbl">pcs</span><div class="axis-hr"></div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const DAYS = [
  {key:'SUN', label:'Sun', color:'#E24B4A'},   // สีแดง
  {key:'MON', label:'Mon', color:'#F5C100'},   // สีเหลือง
  {key:'TUE', label:'Tue', color:'#E879A0'},   // สีชมพู
  {key:'WED', label:'Wed', color:'#1DB560'},   // สีเขียว
  {key:'THU', label:'Thu', color:'#F97316'},   // สีส้ม
  {key:'FRI', label:'Fri', color:'#378ADD'},   // สีฟ้า
  {key:'SAT', label:'Sat', color:'#8B5CF6'},   // สีม่วง
];

const HOURS = ['07:30','08:30','09:40','10:30','12:10','13:30','14:40','15:30','16:50','17:50'];
const PLAN  = [798,1129,755,1043,1230,988,601,910,755,1368];
const T_HI  = 83;
const T_LO  = 75;
const MAX_PCS = Math.max(...PLAN) * 1.08;

const OA = {
  SUN:[75,83,78,79,54,69,70,73,78,72],
  MON:[83,92,74,83,87,80,76,80,83,77],
  TUE:[76,58,52,73,54,69,70,73,56,72],
  WED:[83,83,74,87,80,82,76,80,83,77],
  THU:[83,83,52,79,87,80,76,80,79,77],
  FRI:[83,92,74,83,87,80,76,80,83,83],
  SAT:[75,83,78,79,93,86,76,80,79,77],
};

const grid = document.getElementById('grid');

// Plugin: target band + OA line on the RIGHT y-axis via canvas overlay
const bandPlugin = {
  id:'band',
  beforeDatasetsDraw(chart) {
    const {ctx, scales} = chart;
    const xOA = scales['xOA'];
    const yMain = scales['y'];
    if (!xOA || !yMain) return;

    // Draw target band on the %OA axis so it aligns with the OA dots
    const xHi = xOA.getPixelForValue(T_HI);
    const xLo = xOA.getPixelForValue(T_LO);
    const top  = yMain.top;
    const bot  = yMain.bottom;

    ctx.save();
    ctx.fillStyle = 'rgba(24,95,165,0.07)';
    ctx.fillRect(xLo, top, xHi - xLo, bot - top);
    ctx.setLineDash([4,3]);
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(24,95,165,0.45)';
    ctx.beginPath(); ctx.moveTo(xHi, top); ctx.lineTo(xHi, bot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(xLo, top); ctx.lineTo(xLo, bot); ctx.stroke();
    ctx.restore();
  }
};

DAYS.forEach((d, idx) => {
  const oaArr   = OA[d.key];
  const actual  = PLAN.map((p,i) => Math.round(p * oaArr[i] / 100));
  const inRange = oaArr.map(v => v >= T_LO && v <= T_HI);
  const avgOa   = Math.round(oaArr.reduce((a,b)=>a+b,0)/oaArr.length);
  const avgOk   = avgOa >= T_LO && avgOa <= T_HI;

  // Card
  const card = document.createElement('div');
  card.className = 'day-card';

  card.innerHTML = `
    <div class="day-header">
      <span class="day-name" style="color:${d.color}">${d.label}</span>
    </div>
    <div class="chart-wrap"><canvas id="c-${d.key}"></canvas></div>
  `;
  grid.appendChild(card);

  const canvas = card.querySelector(`#c-${d.key}`);

  new Chart(canvas, {
    plugins: [bandPlugin],
    data: {
      labels: HOURS,
      datasets: [
        // Horizontal bar — Plan (order:2 → renders before Actual → appears on top)
        {
          type: 'bar',
          label: 'Plan',
          data: PLAN,
          backgroundColor: 'rgba(180,178,169,0.3)',
          borderColor: 'rgba(180,178,169,0.5)',
          borderWidth: 0.5,
          borderRadius: 2,
          xAxisID: 'xBar',
          yAxisID: 'y',
          order: 2,
          barPercentage: 0.8,
          categoryPercentage: 0.9,
        },
        // Horizontal bar — Actual (order:3 → renders after Plan → appears below)
        {
          type: 'bar',
          label: 'Actual',
          data: actual,
          backgroundColor: inRange.map(ok => ok ? 'rgba(29,158,117,0.85)' : 'rgba(226,75,74,0.85)'),
          borderRadius: 2,
          xAxisID: 'xBar',
          yAxisID: 'y',
          order: 3,
          barPercentage: 0.8,
          categoryPercentage: 0.9,
        },
        // Line — %OA per hour
        {
          type: 'line',
          label: '%OA',
          data: oaArr,
          borderColor: d.color,
          borderWidth: 1.8,
          pointRadius: oaArr.map(v => v >= T_LO && v <= T_HI ? 3 : 4),
          pointBackgroundColor: oaArr.map(v => v >= T_LO && v <= T_HI ? '#378ADD' : '#E24B4A'),
          pointBorderColor: oaArr.map(v => v >= T_LO && v <= T_HI ? '#378ADD' : '#E24B4A'),
          tension: 0.35,
          xAxisID: 'xOA',
          yAxisID: 'yOA',
          order: 1,
        },
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          callbacks: {
            title: ctx => HOURS[ctx[0].dataIndex],
            label: ctx => {
              const i = ctx.dataIndex;
              if (ctx.dataset.label === 'Plan')   return ` Plan: ${PLAN[i].toLocaleString()} pcs`;
              if (ctx.dataset.label === 'Actual') return ` Actual: ${actual[i].toLocaleString()} pcs`;
              if (ctx.dataset.label === '%OA')    return ` %OA: ${oaArr[i]}%${inRange[i]?' ✓':' ⚠'}`;
              return '';
            }
          }
        }
      },
      scales: {
        // Shared Y (hours) — for bar datasets
        y: {
          type: 'category',
          labels: HOURS,
          position: 'left',
          ticks: { font:{size:8}, color:'#aaa', display: idx === 0 },
          grid: { color:'rgba(128,128,128,0.08)', lineWidth:0.5 },
          offset: true,
          afterFit(scale) { scale.width = 34; },
        },
        // X for bars (pieces)
        xBar: {
          type: 'linear',
          position: 'bottom',
          min: 0,
          max: MAX_PCS,
          ticks: { font:{size:8}, color:'#aaa', callback: v => (v===0||v===MAX_PCS) ? (v>=1000?(v/1000).toFixed(1)+'k':v) : null },
          grid: { display: false },
          title: { display: false },
        },
        // X for OA line (0–100%)
        xOA: {
          type: 'linear',
          position: 'top',
          min: 0,
          max: 100,
          ticks: {
            font:{size:8}, color: d.color,
            includeBounds: true,
            callback: v => (v === 0 || v === 100) ? v+'%' : null,
          },
          grid: { display: false },
          title: { display: false },
        },
        // Hidden Y axis for OA line (shares same category positions)
        yOA: {
          type: 'category',
          labels: HOURS,
          position: 'right',
          display: false,
          offset: true,
        },
      }
    }
  });
});
</script>
